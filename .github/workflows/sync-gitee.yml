name: Sync GitHub to Gitee

on:
  push:
    branches:
      - master

  workflow_dispatch:


jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Mirror to Gitee
        run: |
          git clone --mirror https://github.com/HYAdonisCoding/ECommerce_Insight.git
          cd ECommerce_Insight.git
          git push --mirror https://${{ secrets.GITEE_USERNAME }}:${{ secrets.GITEE_TOKEN }}@gitee.com/HYAdonisCoding/ECommerce_Insight.git